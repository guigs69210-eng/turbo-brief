name: Turbo Brief Auto

on:
  schedule:
    - cron: '50 7 * * 1-5'
    - cron: '20 12 * * 1-5'
  workflow_dispatch:
    inputs:
      trigger:
        description: 'Type de brief'
        required: true
        default: 'manual'
        type: choice
        options:
          - morning
          - us
          - fomc
          - manual

jobs:
  brief:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Detect trigger
        id: trigger
        run: |
          HOUR=$(date -u +%H)
          MANUAL="${{ github.event.inputs.trigger }}"
          if [ -n "$MANUAL" ]; then
            echo "type=$MANUAL" >> $GITHUB_OUTPUT
          elif [ "$HOUR" = "07" ]; then
            echo "type=morning" >> $GITHUB_OUTPUT
          elif [ "$HOUR" = "12" ]; then
            echo "type=us" >> $GITHUB_OUTPUT
          else
            echo "type=refresh" >> $GITHUB_OUTPUT
          fi

      - name: Run brief agent
        env:
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          BRIEF_TRIGGER: ${{ steps.trigger.outputs.type }}
        run: python run_brief.py --trigger $BRIEF_TRIGGER

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: brief-${{ github.run_number }}
          path: output/brief_latest.json
          retention-days: 7
