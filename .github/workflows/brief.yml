name: Turbo Brief Auto

on:
  schedule:
    - cron: '50 7 * * 1-5'
    - cron: '20 12 * * 1-5'
    - cron: '20 13 * * 1-5'
    - cron: '20 15 * * 1-5'
    - cron: '45 16 * * 1-5'
    - cron: '0 19 * * 1-5'
  workflow_dispatch:
    inputs:
      trigger:
        description: 'Type de brief'
        required: true
        default: 'manual'
        type: choice
        options:
          - morning
          - us
          - fomc
          - manual

jobs:
  brief:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Detect trigger
        id: trigger
        run: |
          HOUR=$(date -u +%H)
          MANUAL="${{ github.event.inputs.trigger }}"
          if [ -n "$MANUAL" ]; then
            echo "type=$MANUAL" >> $GITHUB_OUTPUT
          elif [ "$HOUR" = "07" ]; then
            echo "type=morning" >> $GITHUB_OUTPUT
          el
