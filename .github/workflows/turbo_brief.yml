run :
name: Turbo Brief Daily

on:
  schedule:
    - cron: '0 6 * * 1-5'
  workflow_dispatch:

jobs:
  send-brief:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install reportlab yfinance

      - name: Run Turbo Brief Agent
        run: python agent_makecom.py --token "${{ secrets.TELEGRAM_TOKEN }}" --chat "${{ secrets.TELEGRAM_CHAT }}"
